name: Release new docset

on:
  workflow_run:
    workflows:
      - "Push new tag"
    types:
      - completed
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Retrieves full history including git tags
      - name: build
        run: ./build-docset.sh
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
      # Extract tag, required for `on.workflow_run`.
      - name: Get latest tag
        id: get-latest-tag
        run: ./get-latest-tag.sh
      - name: Display latest tag
        run: |
          echo "${{ toJSON(steps.get-latest-tag.outputs) }}"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-latest-tag.outputs.tag-name }}
          files: |
            Snowflake.docset.tgz
            Snowflake.xml
